name: Sync CI

on:
  push:
    paths:
      - 'sync/**'
      - '.github/**'
  pull_request:
    paths:
      - 'sync/**'
      - '.github/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax check sync JavaScript
        run: |
          set -eo pipefail
          find sync -name '*.js' ! -name '*.generated.js' -print0 \
            | xargs -0 -r -n1 node --check
          find sync -name '*.generated.js' -print0 | while IFS= read -r -d '' f; do
            node -e '
              const fs = require("fs");
              const src = fs.readFileSync(process.argv[1], "utf8");
              const AsyncFn = Object.getPrototypeOf(async function () {}).constructor;
              try { new AsyncFn(src); }
              catch (e) { console.error(process.argv[1] + ": " + e.message); process.exit(1); }
            ' "$f"
          done
      - name: Offline tests
        run: node sync/__tests__/run-tests.js
      - name: Offline dry run
        run: node sync/run-local-dry.js
      - name: Doc lint
        run: node sync/tools/doc-lint.js
      - name: Secret scan
        run: node sync/tools/secret-scan.js
      - name: Generated n8n bundles are current
        run: node sync/tools/check-generated.js
